root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/goclaw.exe"
  cmd = "go build -o ./tmp/goclaw.exe ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "ui/web/node_modules", "ui/web/dist", "ui/desktop", "internal/webui/dist", "data", "skills", ".git", "plans"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
